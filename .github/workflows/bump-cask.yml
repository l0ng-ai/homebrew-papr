name: Bump cask

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update cask to latest Papr release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SRC_REPO="l0ng-ai/papr"
          CASK="Casks/papr.rb"

          TAG=$(gh release view --repo "$SRC_REPO" --json tagName --jq .tagName)
          VERSION="${TAG#v}"
          CURRENT=$(sed -nE 's/^[[:space:]]*version "([^"]+)".*/\1/p' "$CASK")
          echo "current=$CURRENT  latest=$VERSION"
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "Cask already up to date."
            exit 0
          fi

          tmp=$(mktemp -d)
          gh release download "$TAG" --repo "$SRC_REPO" \
            --pattern "Papr_${VERSION}_aarch64.dmg" \
            --pattern "Papr_${VERSION}_x64.dmg" \
            --dir "$tmp"
          ARM_SHA=$(sha256sum "$tmp/Papr_${VERSION}_aarch64.dmg" | cut -d' ' -f1)
          INTEL_SHA=$(sha256sum "$tmp/Papr_${VERSION}_x64.dmg" | cut -d' ' -f1)
          echo "arm=$ARM_SHA intel=$INTEL_SHA"

          sed -i -E "s/^([[:space:]]*version ).*/\1\"${VERSION}\"/" "$CASK"
          sed -i -E "s/^([[:space:]]*sha256 arm:[[:space:]]*).*/\1\"${ARM_SHA}\",/" "$CASK"
          sed -i -E "s/^([[:space:]]*intel:[[:space:]]*).*/\1\"${INTEL_SHA}\"/" "$CASK"

          echo "----- updated cask -----"
          cat "$CASK"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK"
          git commit -m "Update papr to ${VERSION}"
          git push
